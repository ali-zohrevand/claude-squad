name: Feature request
description: Suggest a new stack, agent, command, or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: The problem / use case
      description: What are you trying to do that squad doesn't support yet?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - New stack-conventions (language/framework)
        - Agent (role/persona)
        - Command (phase/workflow)
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: false
